<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculadora 2 - Renda Alvo</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <div class="container mt-5 mb-5">
      <div class="card p-4 mx-auto" style="max-width: 600px;">
        <h2 class="mb-4 text-center">Calculadora de Renda Alvo</h2>
 
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
 
        <form action="{{ url_for('calculator2_calculate') }}" method="POST">
          <div class="mb-3">
            <label for="target_income" class="form-label">Renda Alvo</label>
            <input type="text" class="form-control currency-input" id="target_income" name="target_income" placeholder="0,00" value="{{ target_income }}" required>
          </div>
          <div class="mb-3">
            <label for="initial_investment" class="form-label">Investimento Inicial</label>
            <input type="text" class="form-control currency-input" id="initial_investment" name="initial_investment" placeholder="0,00" value="{{ initial_investment }}">
          </div>
          <div class="mb-3">
            <label for="annual_rate" class="form-label">Taxa de Retorno Anual (%)</label>
            <input type="text" class="form-control percent-input" id="annual_rate" name="annual_rate" placeholder="0,00" value="{{ annual_rate }}" required>
          </div>
          <div class="mb-3">
            <label for="safe_withdrawal_rate" class="form-label">Taxa de Retirada Segura (%)</label>
            <input type="text" class="form-control percent-input" id="safe_withdrawal_rate" name="safe_withdrawal_rate" placeholder="0,00" value="{{ safe_withdrawal_rate }}" required>
          </div>
          <div class="mb-3">
            <label for="birth_year" class="form-label">Ano de Nascimento (Opcional)</label>
            <input type="number" class="form-control" id="birth_year" name="birth_year" placeholder="Opcional (ex: 1990)" min="1900" max="2030" value="{{ birth_year }}">
          </div>
          <div class="row animate-fade-in">
            <div class="col-md-6 mb-3">
              <label for="extra_deposit" class="form-label">Aporte Extra Único (Opcional)</label>
              <input type="text" class="form-control currency-input" id="extra_deposit" name="extra_deposit" placeholder="0,00" value="{{ extra_deposit }}">
            </div>
            <div class="col-md-6 mb-3">
              <label for="extra_deposit_year" class="form-label">Ano do Aporte Extra (Opcional)</label>
              <input type="number" class="form-control" id="extra_deposit_year" name="extra_deposit_year" placeholder="Ex: 15" min="1" max="100" value="{{ extra_deposit_year }}">
            </div>
          </div>
          
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-success btn-lg">Calcular</button>
          </div>
        </form>
 
        <div class="text-center mt-3">
          <a href="{{ url_for('home') }}" class="text-muted text-decoration-none">&larr; Voltar para o Início</a>
        </div>
      </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Cleave.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cleave.js/1.6.0/cleave.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.currency-input').forEach(function(el) {
          new Cleave(el, {
            numeral: true,
            numeralThousandsGroupStyle: 'thousand',
            delimiter: '.',
            numeralDecimalMark: ',',
            numeralDecimalScale: 2
          });
        });
        document.querySelectorAll('.percent-input').forEach(function(el) {
          new Cleave(el, {
            numeral: true,
            delimiter: '.',
            numeralDecimalMark: ',',
            numeralDecimalScale: 2
          });
        });
      });
    </script>
  </body>
</html>
