<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculator 1 - Monthly Investment</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <div class="container mt-5 mb-5">
      <div class="card p-4 mx-auto" style="max-width: 600px;">
        <h2 class="mb-4 text-center">Monthly Investment Calculator</h2>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('calculator1_calculate') }}" method="POST">
          <div class="mb-3">
            <label for="monthly_savings" class="form-label">Monthly Savings Capacity</label>
            <input type="text" class="form-control currency-input" id="monthly_savings" name="monthly_savings" placeholder="0,00" value="{{ monthly_savings }}">
          </div>
          <div class="mb-3">
            <label for="initial_investment" class="form-label">Initial Investment</label>
            <input type="text" class="form-control currency-input" id="initial_investment" name="initial_investment" placeholder="0,00" value="{{ initial_investment }}">
          </div>
          <div class="mb-3">
            <label for="annual_rate" class="form-label">Annual Return Rate (%)</label>
            <input type="text" class="form-control percent-input" id="annual_rate" name="annual_rate" placeholder="0,00" value="{{ annual_rate }}" required>
          </div>
          <div class="mb-3">
            <label for="safe_withdrawal_rate" class="form-label">Safe Withdrawal Rate (%)</label>
            <input type="text" class="form-control percent-input" id="safe_withdrawal_rate" name="safe_withdrawal_rate" placeholder="0,00" value="{{ safe_withdrawal_rate }}" required>
          </div>
          <div class="mb-3">
            <label for="birth_year" class="form-label">Birth Year (Optional)</label>
            <input type="number" class="form-control" id="birth_year" name="birth_year" placeholder="Optional (e.g. 1990)" min="1900" max="2030" value="{{ birth_year }}">
          </div>
          
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">Calculate</button>
          </div>
        </form>

        <div class="text-center mt-3">
          <a href="{{ url_for('home') }}" class="text-muted text-decoration-none">&larr; Back to Home</a>
        </div>
      </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Cleave.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cleave.js/1.6.0/cleave.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.currency-input').forEach(function(el) {
          new Cleave(el, {
            numeral: true,
            numeralThousandsGroupStyle: 'thousand',
            delimiter: '.',
            numeralDecimalMark: ',',
            numeralDecimalScale: 2
          });
        });
        document.querySelectorAll('.percent-input').forEach(function(el) {
          new Cleave(el, {
            numeral: true,
            delimiter: '.',
            numeralDecimalMark: ',',
            numeralDecimalScale: 2
          });
        });
      });
    </script>
  </body>
</html>
