<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Results - Monthly Investment</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <div class="container mt-5 mb-5">
      <div class="card p-4 mx-auto">
        <h2 class="mb-4 text-center">Your Investment Projections</h2>
        
        <form action="{{ url_for('calculator1_calculate') }}" method="POST" class="row g-3 mb-4 align-items-end justify-content-center">
          <div class="col-md-2 col-sm-6">
            <label for="monthly_savings" class="form-label fw-bold small text-muted mb-1">Monthly Savings</label>
            <input type="text" class="form-control form-control-sm currency-input" id="monthly_savings" name="monthly_savings" value="{{ monthly_savings }}">
          </div>
          <div class="col-md-2 col-sm-6">
            <label for="initial_investment" class="form-label fw-bold small text-muted mb-1">Initial Investment</label>
            <input type="text" class="form-control form-control-sm currency-input" id="initial_investment" name="initial_investment" value="{{ initial_investment }}">
          </div>
          <div class="col-md-2 col-sm-6">
            <label for="annual_rate" class="form-label fw-bold small text-muted mb-1">Annual Rate (%)</label>
            <input type="text" class="form-control form-control-sm percent-input" id="annual_rate" name="annual_rate" value="{{ annual_rate }}" required>
          </div>
          <div class="col-md-2 col-sm-6">
            <label for="safe_withdrawal_rate" class="form-label fw-bold small text-muted mb-1">Safe Withdrawal (%)</label>
            <input type="text" class="form-control form-control-sm percent-input" id="safe_withdrawal_rate" name="safe_withdrawal_rate" value="{{ safe_withdrawal_rate }}" required>
          </div>
          <div class="col-md-2 col-sm-6">
            <label for="birth_year" class="form-label fw-bold small text-muted mb-1">Birth Year (Optional)</label>
            <input type="number" class="form-control form-control-sm" id="birth_year" name="birth_year" value="{{ birth_year }}" min="1900" max="2030">
          </div>
          <div class="col-md-2 col-sm-6 d-grid">
            <button type="submit" class="btn btn-primary btn-sm pt-2 pb-2">Recalculate</button>
          </div>
        </form>
        
        <div class="chart-container">
          <canvas id="projectionChart"></canvas>
        </div>

        <div class="table-responsive mt-4">
          <table class="table table-hover table-striped">
            <thead>
              <tr>
                <th>Years Invested</th>
                <th>Future Value</th>
                <th>Monthly Passive Income</th>
              </tr>
            </thead>
            <tbody>
              {% for row in results %}
              <tr>
                <td>
                  {{ row.years }} Years
                  {% if row.age %}
                  <br><small class="text-muted">Year: {{ row.future_year }} | Age: {{ row.age }}</small>
                  {% endif %}
                </td>
                <td>{{ row.future_value }}</td>
                <td><strong>{{ row.monthly_income }}</strong></td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>

        <div class="text-center mt-4">
          <a href="{{ url_for('calculator1_index') }}" class="btn btn-secondary">Back to Calculator</a>
          <a href="{{ url_for('home') }}" class="btn btn-outline-secondary">Back to Home</a>
        </div>
      </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Cleave.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cleave.js/1.6.0/cleave.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.currency-input').forEach(function(el) {
          new Cleave(el, {
            numeral: true,
            numeralThousandsGroupStyle: 'thousand',
            delimiter: '.',
            numeralDecimalMark: ',',
            numeralDecimalScale: 2
          });
        });
        document.querySelectorAll('.percent-input').forEach(function(el) {
          new Cleave(el, {
            numeral: true,
            delimiter: '.',
            numeralDecimalMark: ',',
            numeralDecimalScale: 2
          });
        });
      });
      const ctx = document.getElementById('projectionChart').getContext('2d');
      const labels = [{% for r in results %}{{ r.years }}{% if not loop.last %},{% endif %}{% endfor %}];
      const fvData = [{% for r in results %}{{ r.future_value_raw }}{% if not loop.last %},{% endif %}{% endfor %}];
      const incomeData = [{% for r in results %}{{ r.monthly_income_raw }}{% if not loop.last %},{% endif %}{% endfor %}];
      const ageData = [{% for r in results %}{{ r.age or 'null' }}{% if not loop.last %},{% endif %}{% endfor %}];
      const yearData = [{% for r in results %}{{ r.future_year or 'null' }}{% if not loop.last %},{% endif %}{% endfor %}];

      function formatPortugueseNumber(value, decimals = 2) {
        return Number(value).toLocaleString('pt-BR', {
          minimumFractionDigits: decimals,
          maximumFractionDigits: decimals
        });
      }

      const chartLabels = labels.map((y, idx) => {
        if (ageData[idx] !== null) {
          return `${y} Years (${yearData[idx]} - Age: ${ageData[idx]})`;
        }
        return y + ' Years';
      });

      new Chart(ctx, {
        type: 'line',
        data: {
          labels: chartLabels,
          datasets: [
            {
              label: 'Future Value',
              data: fvData,
              borderColor: '#10b981',
              backgroundColor: 'rgba(16, 185, 129, 0.1)',
              yAxisID: 'y',
              tension: 0.4,
              fill: true
            },
            {
              label: 'Monthly Passive Income',
              data: incomeData,
              borderColor: '#3b82f6',
              backgroundColor: 'rgba(59, 130, 246, 0.1)',
              yAxisID: 'y1',
              tension: 0.4,
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false,
          },
          plugins: {
            tooltip: {
              callbacks: {
                label: function(context) {
                  let label = context.dataset.label || '';
                  if (label) {
                    label += ': ';
                  }
                  if (context.parsed.y !== null) {
                    label += formatPortugueseNumber(context.parsed.y, 2);
                  }
                  return label;
                }
              }
            }
          },
          scales: {
            y: {
              type: 'linear',
              display: true,
              position: 'left',
              title: { display: true, text: 'Future Value' },
              suggestedMax: Math.max(...fvData) * 1.1,
              ticks: {
                callback: function(value) {
                  return formatPortugueseNumber(value, 2);
                }
              }
            },
            y1: {
              type: 'linear',
              display: true,
              position: 'right',
              title: { display: true, text: 'Monthly Income' },
              grid: { drawOnChartArea: false },
              suggestedMax: Math.max(...incomeData) * 1.5,
              ticks: {
                callback: function(value) {
                  return formatPortugueseNumber(value, 2);
                }
              }
            }
          }
        }
      });
    </script>
  </body>
</html>
