<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculator 3 - Monthly Savings Potential</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <div class="container mt-5 mb-5">
      <div class="card p-4 mx-auto" style="max-width: 600px;">
        <h2 class="mb-4 text-center">Monthly Savings Potential</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('calculator3_calculate') }}" method="POST">
          <div class="mb-4">
            <label for="salary" class="form-label">Salary after taxes (required)</label>
            <input type="text" class="form-control currency-input" id="salary" name="salary" placeholder="0,00" value="{{ salary }}" required>
          </div>
          
          <hr class="my-4">
          <h5 class="mb-3 text-muted">Expenses (optional)</h5>
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="housing" class="form-label">Housing costs</label>
              <input type="text" class="form-control currency-input" id="housing" name="housing" placeholder="0,00" value="{{ housing }}">
            </div>
            <div class="col-md-6 mb-3">
              <label for="utilities" class="form-label">Utilities &amp; bills</label>
              <input type="text" class="form-control currency-input" id="utilities" name="utilities" placeholder="0,00" value="{{ utilities }}">
            </div>
            <div class="col-md-6 mb-3">
              <label for="transportation" class="form-label">Transportation</label>
              <input type="text" class="form-control currency-input" id="transportation" name="transportation" placeholder="0,00" value="{{ transportation }}">
            </div>
            <div class="col-md-6 mb-3">
              <label for="food" class="form-label">Food &amp; groceries</label>
              <input type="text" class="form-control currency-input" id="food" name="food" placeholder="0,00" value="{{ food }}">
            </div>
            <div class="col-md-6 mb-3">
              <label for="hobbies" class="form-label">Hobbies</label>
              <input type="text" class="form-control currency-input" id="hobbies" name="hobbies" placeholder="0,00" value="{{ hobbies }}">
            </div>
            <div class="col-md-6 mb-3">
              <label for="subscriptions" class="form-label">Subscriptions</label>
              <input type="text" class="form-control currency-input" id="subscriptions" name="subscriptions" placeholder="0,00" value="{{ subscriptions }}">
            </div>
            <div class="col-md-6 mb-3">
              <label for="healthcare" class="form-label">Healthcare</label>
              <input type="text" class="form-control currency-input" id="healthcare" name="healthcare" placeholder="0,00" value="{{ healthcare }}">
            </div>
            <div class="col-md-6 mb-3">
              <label for="debt" class="form-label">Debt repayments</label>
              <input type="text" class="form-control currency-input" id="debt" name="debt" placeholder="0,00" value="{{ debt }}">
            </div>
            <div class="col-md-12 mb-3">
              <label for="other" class="form-label">Other expenses</label>
              <input type="text" class="form-control currency-input" id="other" name="other" placeholder="0,00" value="{{ other }}">
            </div>
          </div>
          
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-info btn-lg">Calculate Savings</button>
          </div>
        </form>
        
        <div class="text-center mt-3">
          <a href="{{ url_for('home') }}" class="text-muted text-decoration-none">&larr; Back to Home</a>
        </div>
      </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Cleave.js for input masking -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cleave.js/1.6.0/cleave.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.currency-input').forEach(function(el) {
          new Cleave(el, {
            numeral: true,
            numeralThousandsGroupStyle: 'thousand',
            delimiter: '.',
            numeralDecimalMark: ',',
            numeralDecimalScale: 2
          });
        });
      });
    </script>
  </body>
</html>
